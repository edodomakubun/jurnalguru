<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Jurnal Guru Nasional</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .table-container::-webkit-scrollbar { height: 8px; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="text-gray-800 antialiased overflow-hidden h-screen flex">

  <div id="appRoot" class="w-full h-full flex">
    <div id="loginScreen" class="absolute inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-blue-900 to-indigo-800">
      <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md text-center fade-in">
        <div class="bg-blue-100 text-blue-700 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-book-open text-4xl"></i></div>
        <h2 class="text-3xl font-bold mb-2">E-Jurnal Guru</h2>
        <p class="text-gray-500 mb-8 text-sm">Portal Nasional (Cloud Server)</p>
        <div class="space-y-4 text-left">
          <div><label class="block text-sm font-semibold mb-1">ID Pengguna</label><input type="text" id="userId" placeholder="G001" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></div>
          <div><label class="block text-sm font-semibold mb-1">PIN Rahasia</label><input type="password" id="pin" placeholder="••••••" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></div>
          <button onclick="prosesLogin()" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg mt-4"><i class="fa-solid fa-right-to-bracket mr-2"></i> Masuk Sistem</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Mendaftarkan Service Worker untuk PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }
  </script>
</body>
</html>
